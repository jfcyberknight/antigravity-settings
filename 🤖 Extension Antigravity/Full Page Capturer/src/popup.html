<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Pro | Full Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1c2125;
            --glass: rgba(28, 33, 37, 0.75);
            --border: rgba(255, 255, 255, 0.05);
            --accent: #d21727;
            --accent-glow: rgba(210, 23, 39, 0.6);
            --text: #e0e4e8;
            --text-dim: #7a8086;
        }

        body {
            width: 340px;
            margin: 0;
            padding: 24px;
            font-family: 'Outfit', sans-serif;
            background: var(--bg) url('background.png') center/cover no-repeat;
            color: var(--text);
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Grain Texture */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 10;
        }

        .glass-panel {
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
        }

        .logo-container {
            width: 60px;
            height: auto;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(210, 23, 39, 0.3);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-container:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .logo-container img {
            width: 100%;
            height: auto;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -1.5px;
            background: linear-gradient(90deg, #fff 0%, #6b7280 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        p {
            font-size: 0.825rem;
            color: var(--text-dim);
            margin: 0;
            line-height: 1.5;
            font-weight: 300;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 40px var(--accent-glow);
            transform: translateY(-3px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #1a1a1a;
            color: #444;
            cursor: not-allowed;
            border-color: #222;
        }

        .progress-wrapper {
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #94131e, var(--accent));
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .status {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Micro-animations */
        @keyframes pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .processing .logo-container {
            animation: pulse 2s infinite ease-in-out;
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }
    </style>
</head>
<body>
    <div class="glass-panel" id="mainContainer">
        <div class="header">
            <div class="logo-container">
                <img src="logo.png" alt="DarkMedia Logo">
            </div>
            <div>
                <h1>Capture Pro</h1>
                <p>Défilement & assemblage haute résolution</p>
            </div>
        </div>
        
        <button id="captureBtn" class="btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            Capturer la Page
        </button>

        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="status" id="statusText">PRÉPARATION DE L'ASSEMBLAGE...</div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
