<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks Cleaner Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1c2125;
            --glass: rgba(28, 33, 37, 0.75);
            --border: rgba(255, 255, 255, 0.05);
            --accent: #d21727;
            --accent-glow: rgba(210, 23, 39, 0.6);
            --text: #e0e4e8;
            --text-dim: #7a8086;
        }

        body {
            width: 340px;
            margin: 0;
            padding: 24px;
            font-family: 'Outfit', sans-serif;
            background: var(--bg) url('background.png') center/cover no-repeat;
            color: var(--text);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Grain Texture */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 10;
        }

        .glass-panel {
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
        }

        .icon-container {
            width: 60px;
            height: auto;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(210, 23, 39, 0.3);
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .icon-container:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .icon-container img {
            width: 100%;
            height: auto;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0;
            font-weight: 600;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff 0%, #9ca3af 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin: 0;
            line-height: 1.4;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #1e1e1e;
            color: #444;
            cursor: wait;
            box-shadow: none;
            border-color: #333;
        }

        .loader {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #status {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: center;
            min-height: 1.5em;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
        }

        .pulse {
            animation: pulse-bg 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes pulse-bg {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="header">
            <div class="icon-container">
                <img src="logo.png" alt="DarkMedia Logo">
            </div>
            <h1>Smart Cleaner</h1>
            <p>Intelligence de tri v3.15</p>
        </div>

        <div class="action-area" style="display: flex; flex-direction: column; gap: 16px;">
            <button id="cleanBtn" class="btn">
                <span class="loader" id="loader"></span>
                <span id="btnText">Nettoyage Intelligent</span>
            </button>
            <div id="status">Prêt à organiser vos favoris.</div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
