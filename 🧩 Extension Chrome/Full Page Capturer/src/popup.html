<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Page Capturer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #030712;
            --card: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            width: 340px;
            margin: 0;
            padding: 24px;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .glass-panel {
            width: 100%;
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
        }

        .logo-container {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 24px var(--primary-glow);
            transition: transform 0.3s ease;
        }

        .logo-container img {
            width: 44px;
            height: 44px;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.875rem;
            color: var(--text-dim);
            margin: 0;
            line-height: 1.5;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #1e293b;
            color: #475569;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .progress-wrapper {
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .status {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: center;
            font-weight: 500;
        }

        /* Micro-animations */
        @keyframes pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.04); filter: brightness(1.1); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .processing .logo-container {
            animation: pulse 2.5s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div class="glass-panel" id="mainContainer">
        <div class="header">
            <div class="logo-container">
                <img src="../icons/icon128.png" alt="Logo">
            </div>
            <div>
                <h1>Capture de Page</h1>
                <p>Défilement & assemblage haute résolution</p>
            </div>
        </div>
        
        <button id="captureBtn" class="btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            Capturer la Page
        </button>

        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="status" id="statusText">Traitement des sections...</div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
